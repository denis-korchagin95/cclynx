name: Assembly Examples

on:
  workflow_run:
    workflows: [Tests]
    types: [completed]

jobs:
  assembly-examples:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Install ARM64 cross-tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu qemu-user

      - name: Build
        run: make build

      - name: Run assembly examples
        run: ./scripts/check-examples.sh
