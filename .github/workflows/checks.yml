name: Checks

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build jcunit
        run: |
          git clone --branch v1.2.0 --depth 1 https://github.com/denis-korchagin95/jcunit.git /tmp/jcunit
          make -C /tmp/jcunit
          sudo make -C /tmp/jcunit install

      - name: Build
        run: make build

      - name: Build testers
        run: make build-testers

      - name: Run tests
        run: jcunit --no-cache tests/

  assembly-examples:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ARM64 cross-tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu qemu-user

      - name: Build
        run: make build

      - name: Run assembly examples
        run: ./scripts/check-examples.sh
